apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openzev.fullname" . }}-worker
  labels:
    {{- include "openzev.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "openzev.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.worker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ include "openzev.imageTag" (dict "tag" .Values.worker.image.tag "context" .) }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          command: {{- toYaml .Values.worker.command | nindent 12 }}
          env:
            - name: SECRET_KEY
              {{- if .Values.secretKey.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretKey.existingSecret.name }}
                  key: {{ .Values.secretKey.existingSecret.key }}
              {{- else }}
              value: {{ .Values.secretKey.value | quote }}
              {{- end }}
            - name: DATABASE_URL
              {{- if .Values.database.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret.name }}
                  key: {{ .Values.database.existingSecret.key }}
              {{- else }}
              value: {{ .Values.database.url | quote }}
              {{- end }}
            - name: CELERY_BROKER_URL
              value: {{ .Values.redis.url | quote }}
            - name: EMAIL_BACKEND
              value: {{ .Values.email.backend | quote }}
            - name: EMAIL_HOST
              value: {{ .Values.email.host | quote }}
            - name: EMAIL_PORT
              value: {{ .Values.email.port | quote }}
            - name: EMAIL_USE_TLS
              value: {{ .Values.email.useTls | quote }}
            - name: EMAIL_HOST_USER
              value: {{ .Values.email.hostUser | quote }}
            - name: DEFAULT_FROM_EMAIL
              value: {{ .Values.email.defaultFromEmail | quote }}
            - name: FRONTEND_URL
              value: {{ .Values.email.frontendUrl | quote }}
            {{- if .Values.backend.allowedHosts }}
            - name: ALLOWED_HOSTS
              value: {{ .Values.backend.allowedHosts | quote }}
            {{- end }}
            - name: EMAIL_HOST_PASSWORD
              {{- if .Values.email.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.email.existingSecret.name }}
                  key: {{ .Values.email.existingSecret.key }}
              {{- else }}
              value: ""
              {{- end }}
            {{- range $key, $value := .Values.worker.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: media
              mountPath: /app/media
          {{- with .Values.worker.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "openzev.mediaClaimName" . }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
