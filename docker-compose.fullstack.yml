services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.fullstack
      args:
        VITE_API_BASE_URL: /api/v1
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: postgres://openzev:openzev@db:5432/openzev
      CELERY_BROKER_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:8080
    depends_on:
      - db
      - redis
    ports:
      - "8080:80"
    volumes:
      - backend_media:/app/media

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config worker -l info
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: postgres://openzev:openzev@db:5432/openzev
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      - app
      - redis

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: openzev
      POSTGRES_USER: openzev
      POSTGRES_PASSWORD: openzev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  backend_media:
