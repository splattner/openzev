name: Release Images

on:
    release:
        types: [published]

permissions:
    contents: write
    packages: write
    id-token: write

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/openzev

jobs:
    build-push-sign:
        name: Build, push, sign and SBOM (${{ matrix.image }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: backend
                      context: .
                      dockerfile: backend/Dockerfile
                      build_args: ""
                    - image: frontend
                      context: .
                      dockerfile: frontend/Dockerfile
                      build_args: ""
                    - image: fullstack
                      context: .
                      dockerfile: Dockerfile.fullstack
                      build_args: VITE_API_BASE_URL=/api/v1

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
                  tags: |
                      type=raw,value=${{ github.event.release.tag_name }}
                      type=raw,value=latest

            - name: Build and push image
              id: build
              uses: docker/build-push-action@v6
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  build-args: ${{ matrix.build_args }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  sbom: true
                  provenance: true

            - name: Install cosign
              uses: sigstore/cosign-installer@v3

            - name: Prepare SBOM metadata
              id: sbom
              run: |
                  IMAGE_REF="${{ env.IMAGE_PREFIX }}-${{ matrix.image }}@${{ steps.build.outputs.digest }}"
                  SBOM_FILE="sbom-${{ matrix.image }}-${{ github.event.release.tag_name }}.spdx.json"
                  echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
                  echo "sbom_file=$SBOM_FILE" >> "$GITHUB_OUTPUT"

            - name: Generate SBOM file (Trivy)
              uses: aquasecurity/trivy-action@0.35.0
              with:
                  scan-type: image
                  image-ref: ${{ steps.sbom.outputs.image_ref }}
                  format: spdx-json
                  output: ${{ steps.sbom.outputs.sbom_file }}

            - name: Sign image (keyless)
              run: cosign sign --yes "${{ steps.sbom.outputs.image_ref }}"

            - name: Attest SBOM (keyless)
              run: |
                  cosign attest --yes \
                    --type spdxjson \
                    --predicate "${{ steps.sbom.outputs.sbom_file }}" \
                    "${{ steps.sbom.outputs.image_ref }}"

            - name: Upload SBOM artifact
              uses: actions/upload-artifact@v4
              with:
                  name: sbom-${{ matrix.image }}
                  path: ${{ steps.sbom.outputs.sbom_file }}
                  if-no-files-found: error

    publish-release-assets:
        name: Publish SBOM release assets
        runs-on: ubuntu-latest
        needs: build-push-sign

        steps:
            - name: Download SBOM artifacts
              uses: actions/download-artifact@v4
              with:
                  path: sbom-assets

            - name: Attach SBOM files to GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  files: sbom-assets/**/*.spdx.json
