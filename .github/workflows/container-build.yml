name: Container Build Check

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

permissions:
    contents: read
    packages: write
    id-token: write

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/openzev

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - image: backend
                      context: .
                      dockerfile: backend/Dockerfile
                      build_args: ""
                    - image: frontend
                      context: .
                      dockerfile: frontend/Dockerfile
                      build_args: ""
                    - image: fullstack
                      context: .
                      dockerfile: Dockerfile.fullstack
                      build_args: VITE_API_BASE_URL=/api/v1

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Compute build timestamp
              id: ts
              run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

            - name: Login to GHCR
              if: github.event_name == 'push'
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              if: github.event_name == 'push'
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
                  tags: |
                      type=raw,value=main
                      type=sha,prefix=main-,format=short

            - name: Build ${{ matrix.image }} image
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.dockerfile }}
                  push: ${{ github.event_name == 'push' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      ${{ matrix.build_args }}
                      OCI_VERSION=main
                      OCI_REVISION=${{ github.sha }}
                      OCI_CREATED=${{ steps.ts.outputs.created }}
                  sbom: ${{ github.event_name == 'push' }}
                  provenance: ${{ github.event_name == 'push' }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Install cosign
              if: github.event_name == 'push'
              uses: sigstore/cosign-installer@v3

            - name: Prepare SBOM metadata
              id: sbom
              if: github.event_name == 'push'
              run: |
                  SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
                  IMAGE_REF="${{ env.IMAGE_PREFIX }}-${{ matrix.image }}@${{ steps.build.outputs.digest }}"
                  SBOM_FILE="sbom-${{ matrix.image }}-main-${SHORT_SHA}.spdx.json"
                  echo "image_ref=$IMAGE_REF" >> "$GITHUB_OUTPUT"
                  echo "sbom_file=$SBOM_FILE" >> "$GITHUB_OUTPUT"

            - name: Generate SBOM file (Trivy)
              if: github.event_name == 'push'
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  scan-type: image
                  image-ref: ${{ steps.sbom.outputs.image_ref }}
                  format: spdx-json
                  output: ${{ steps.sbom.outputs.sbom_file }}

            - name: Sign image (keyless)
              if: github.event_name == 'push'
              run: cosign sign --yes "${{ steps.sbom.outputs.image_ref }}"

            - name: Attest SBOM (keyless)
              if: github.event_name == 'push'
              run: |
                  cosign attest --yes \
                    --type spdxjson \
                    --predicate "${{ steps.sbom.outputs.sbom_file }}" \
                    "${{ steps.sbom.outputs.image_ref }}"

            - name: Upload SBOM artifact
              if: github.event_name == 'push'
              uses: actions/upload-artifact@v7
              with:
                  name: sbom-${{ matrix.image }}-main
                  path: ${{ steps.sbom.outputs.sbom_file }}
                  if-no-files-found: error
