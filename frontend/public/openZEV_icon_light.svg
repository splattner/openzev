<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" aria-label="openZEV light icon">
  <defs>
    <style>
      .blue{stroke:#2EA7E0; fill:none; stroke-width:12; stroke-linecap:round;}
      .green{stroke:#72BE3A; fill:none; stroke-width:12; stroke-linecap:round;}
      .sunray{stroke:#F4CD12; stroke-width:10; stroke-linecap:round;}
      .house-blue{fill:#2EA7E0;}
      .house-green{fill:#72BE3A;}
      .window{fill:#ffffff;}
      .sun-core{fill:#F6C213; stroke:#F2B30E; stroke-width:4;}
      .bolt{fill:#ffffff;}
    </style>
    <g id="house">
      <path d="M-28 10 V-10 L0-32 L28-10 V28 Q28 34 22 34 H-22 Q-28 34 -28 28 Z"/>
      <circle cx="0" cy="-21" r="4" class="window"/>
      <rect x="-14" y="-2" width="10" height="10" rx="1.5" class="window"/>
      <rect x="4" y="-2" width="10" height="10" rx="1.5" class="window"/>
      <rect x="-14" y="12" width="10" height="10" rx="1.5" class="window"/>
      <rect x="4" y="12" width="10" height="10" rx="1.5" class="window"/>
    </g>
  </defs>

  <!-- outer segmented ring -->
  <path class="blue" d="M154 130 A170 170 0 0 1 205 90"/>
  <path class="green" d="M307 90 A170 170 0 0 1 372 129"/>
  <path class="green" d="M115 247 A170 170 0 0 0 145 335"/>
  <path class="blue" d="M176 394 A170 170 0 0 0 260 410"/>
  <path class="blue" d="M362 288 A170 170 0 0 1 344 360"/>

  <path class="blue" d="M168 150 A145 145 0 0 1 208 118"/>
  <path class="green" d="M295 118 A145 145 0 0 1 346 149"/>
  <path class="green" d="M132 250 A145 145 0 0 0 154 316"/>
  <path class="blue" d="M186 376 A145 145 0 0 0 252 389"/>
  <path class="blue" d="M347 282 A145 145 0 0 1 334 334"/>

  <!-- sun -->
  <g transform="translate(256 256)">
    <line class="sunray" x1="0" y1="-74" x2="0" y2="-98"/>
    <line class="sunray" x1="52" y1="-52" x2="69" y2="-69"/>
    <line class="sunray" x1="74" y1="0" x2="98" y2="0"/>
    <line class="sunray" x1="52" y1="52" x2="69" y2="69"/>
    <line class="sunray" x1="0" y1="74" x2="0" y2="98"/>
    <line class="sunray" x1="-52" y1="52" x2="-69" y2="69"/>
    <line class="sunray" x1="-74" y1="0" x2="-98" y2="0"/>
    <line class="sunray" x1="-52" y1="-52" x2="-69" y2="-69"/>
    <line class="sunray" x1="26" y1="-69" x2="34" y2="-91"/>
    <line class="sunray" x1="69" y1="-26" x2="91" y2="-34"/>
    <line class="sunray" x1="69" y1="26" x2="91" y2="34"/>
    <line class="sunray" x1="26" y1="69" x2="34" y2="91"/>
    <line class="sunray" x1="-26" y1="69" x2="-34" y2="91"/>
    <line class="sunray" x1="-69" y1="26" x2="-91" y2="34"/>
    <line class="sunray" x1="-69" y1="-26" x2="-91" y2="-34"/>
    <line class="sunray" x1="-26" y1="-69" x2="-34" y2="-91"/>
    <circle class="sun-core" cx="0" cy="0" r="52"/>
    <path class="bolt" d="M10 -40 L-8 -6 H12 L-12 40 L4 7 H-14 Z"/>
  </g>

  <!-- houses -->
  <g class="house-blue" transform="translate(122 255)"><use href="#house"/></g>
  <g class="house-green" transform="translate(256 113)"><use href="#house"/></g>
  <g class="house-green" transform="translate(389 255)"><use href="#house"/></g>
  <g class="house-blue" transform="translate(333 381) rotate(-12)"><use href="#house"/></g>
  <g class="house-green" transform="translate(179 384) rotate(12)"><use href="#house"/></g>
</svg>
