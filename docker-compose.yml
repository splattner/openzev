services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: postgres://openzev:openzev@db:5432/openzev
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config worker -l info
    env_file:
      - backend/.env.example
    environment:
      DATABASE_URL: postgres://openzev:openzev@db:5432/openzev
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: openzev
      POSTGRES_USER: openzev
      POSTGRES_PASSWORD: openzev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  backend_media:
